<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc">
  <title id="title">Device Breakdown Experience</title>
  <desc id="desc">A premium smartphone separated into illuminated internal layers.</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#07100e"/><stop offset="1" stop-color="#030505"/></linearGradient>
    <linearGradient id="glass" x2="1" y2="1"><stop stop-color="#31564b"/><stop offset=".55" stop-color="#10201d"/><stop offset="1" stop-color="#26350d"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0v36" fill="none" stroke="#d8ff3e" stroke-opacity=".04"/></pattern>
  </defs>
  <rect width="720" height="440" fill="url(#bg)"/><rect width="720" height="440" fill="url(#grid)"/>
  <g fill="none" stroke="#d8ff3e" stroke-opacity=".32"><path d="M42 66h178M500 374h178"/><circle cx="42" cy="66" r="3" fill="#d8ff3e"/></g>
  <g transform="translate(378 35) rotate(8 120 180)">
    <rect x="3" y="18" width="214" height="356" rx="38" fill="#454c49" stroke="#adb8b2" stroke-width="3"/>
    <rect x="18" y="28" width="184" height="336" rx="29" fill="url(#glass)" stroke="#d8ff3e" stroke-opacity=".5"/>
    <g transform="translate(-78)" opacity=".94">
      <rect x="18" y="44" width="184" height="310" rx="26" fill="#b9bdb7" fill-opacity=".23" stroke="#d8ff3e"/>
      <rect x="36" y="88" width="146" height="220" rx="20" fill="#c9cec8" fill-opacity=".68"/>
      <rect x="49" y="52" width="120" height="54" rx="12" fill="#184338" stroke="#d7a65e"/>
      <circle cx="72" cy="75" r="16" fill="#071219" stroke="#aeefff"/><circle cx="116" cy="75" r="16" fill="#071219" stroke="#aeefff"/>
      <rect x="92" y="128" width="52" height="52" rx="8" fill="#080a09" stroke="#d8ff3e" filter="url(#glow)"/>
    </g>
  </g>
  <g font-family="Arial, sans-serif" fill="#f1efe8"><text x="42" y="314" font-size="15" font-weight="700" letter-spacing="3">OBJECT / 01</text><text x="42" y="352" font-size="34" font-weight="700">DEVICE</text><text x="42" y="388" font-size="34" font-weight="700" fill="#d8ff3e">BREAKDOWN</text></g>
</svg>
